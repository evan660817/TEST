<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《水仙》分類小手</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX (Standalone) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; min-height: 100vh; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        input[type="range"] { accent-color: #6366f1; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo } = React;

        // --- Firebase 模組匯入 ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, updateDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 配置與初始化
        // 請將下方的 firebaseConfig 替換成你自己的 Firebase 專案設定
        const firebaseConfig = typeof __firebase_config !== 'undefined'
            ? JSON.parse(__firebase_config)
            : {
                apiKey: "YOUR_API_KEY",
                authDomain: "YOUR_PROJECT.firebaseapp.com",
                projectId: "YOUR_PROJECT_ID",
                storageBucket: "YOUR_PROJECT.appspot.com",
                messagingSenderId: "YOUR_SENDER_ID",
                appId: "YOUR_APP_ID"
            };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'narcissus-sorter-001';

        // --- 測驗資料 ---
        const MALE_TEST = {
            roles: ['院長', '火', '水', '小利卡'],
            questions: [
                { id: 'q1', text: '你在生活中，更在意自己的感受，還是他人的看法？', options: [
                    { label: '自己', scores: { '院長': 1 } },
                    { label: '他人', scores: { '火': 2 } },
                    { label: '兩者差不多', scores: { '水': 1, '小利卡': 1 } }
                ]},
                { id: 'q2', text: '你在工作或學習中，認為自己是一個規矩守規則的人嗎？', options: [
                    { label: '是', scores: { '院長': 2, '火': 1 } },
                    { label: '不是', scores: { '水': 1, '小利卡': 1 } }
                ]},
                { id: 'q3', text: '你在工作或學習中，認為自己是一個好勝心強的人嗎？', options: [
                    { label: '是', scores: { '院長': 2 } },
                    { label: '不是', scores: { '火': 1 } },
                    { label: '還行，有時更', scores: { '小利卡': 1, '水': 1 } }
                ]},
                { id: 'q4', text: '你必須要在事業（夢想）和愛情之間做出選擇的時候，你更選擇？', options: [
                    { label: '事業（夢想）', scores: { '院長': 2 } },
                    { label: '愛情', scores: { '小利卡': 2 } },
                    { label: '真的很難做出選擇', scores: { '水': 1, '火': 1 } }
                ]},
                { id: 'q5', text: '你心中有一個一直追求著的目標，為了達到目標，你可以不擇手段嗎？', options: [
                    { label: '完全可以', scores: { '院長': 2 } },
                    { label: '只要動機合理，可以', scores: { '院長': 1, '小利卡': 2, '火': 1 } },
                    { label: '不可以', scores: { '水': 2 } }
                ]},
                { id: 'q6', text: '穩定感受 vs 具體獨特？', options: [
                    { label: '穩定感受', scores: { '小利卡': 1, '水': 1 } },
                    { label: '具體獨特', scores: { '院長': 1, '火': 1 } }
                ]},
                { id: 'q7', text: '付出型 vs 被付出型？', options: [
                    { label: '傾向付出型', scores: { '火': 2, '小利卡': 1 } },
                    { label: '傾向被付出型', scores: { '院長': 1, '水': 1 } }
                ]},
                { id: 'q8', text: '想法是否容易被身邊的人改變？', options: [
                    { label: '是', scores: { '小利卡': 1, '火': 1 } },
                    { label: '不是', scores: { '院長': 2 } },
                    { label: '還行，有時更', scores: { '水': 1 } }
                ]},
                { id: 'q9', text: '是否經常陷入自我懷疑？', options: [
                    { label: '是', scores: { '水': 2, '火': 1 } },
                    { label: '不是', scores: { '院長': 2, '小利卡': 1 } }
                ]},
                { id: 'q10', text: '接受遊戲中的打罵嗎？', options: [
                    { label: '完全可以，甚至大打罵', scores: { '院長': 3 } },
                    { label: '可以接受適度打罵', scores: { '小利卡': 1, '火': 2, '院長': 2 } },
                    { label: '不可以', scores: { '水': 1 } }
                ]},
                { id: 'q11', text: '願意和 DM 發生愛情互動嗎？', options: [
                    { label: '非常願意', scores: { '水': 2 } },
                    { label: '無所謂', scores: { '水': 1 } },
                    { label: '不願意', scores: { '火': 1, '院長': 1, '小利卡': 1 } }
                ]},
                { id: 'q13', text: '接受三角關係嗎？', options: [
                    { label: '完全可以', scores: { '院長': 2, '小利卡': 3 } },
                    { label: '可以嘗試', scores: { '院長': 1, '小利卡': 2 } },
                    { label: '不可以', scores: { '火': 2, '水': 2 } }
                ]},
                { id: 'q14', text: '接受一段時間不能說話嗎？', options: [
                    { label: '可以，感覺有趣', scores: { '小利卡': 2 } },
                    { label: '願意嘗試', scores: { '小利卡': 1 } },
                    { label: '不可以', scores: { '火': 2, '水': 2, '院長': 2 } }
                ]},
                { id: 'q15', text: '對寵寵付出的愛情線？', options: [
                    { label: '非常願意', scores: { '火': 3 } },
                    { label: '願意嘗試', scores: { '火': 1 } },
                    { label: '不願意', scores: { '小利卡': 2, '水': 2, '院長': 2 } }
                ]},
                { id: 'q16', text: '互動滿足 vs 自我滿足？', options: [
                    { label: '互動滿足', scores: { '火': 2, '院長': 1 } },
                    { label: '自我滿足', scores: { '水': 2, '小利卡': 1 } }
                ]}
            ]
        };

        const FEMALE_TEST = {
            roles: ['鳥', '火', '水', '四月'],
            questions: [
                { id: 'q1', text: '你在生活中，更在意自己的感受，還是他人的看法？', options: [
                    { label: '自己', scores: { '鳥': 1, '四月': 1 } },
                    { label: '他人', scores: { '火': 2 } },
                    { label: '兩者差不多', scores: { '水': 2 } }
                ]},
                { id: 'q2', text: '規矩守規則的人嗎？', options: [
                    { label: '是', scores: { '鳥': 1, '火': 2 } },
                    { label: '不是', scores: { '水': 1, '四月': 2 } }
                ]},
                { id: 'q3', text: '好勝心強的人嗎？', options: [
                    { label: '是', scores: { '四月': 2 } },
                    { label: '不是', scores: { '火': 1 } },
                    { label: '還行，有時更', scores: { '鳥': 1, '水': 1 } }
                ]},
                { id: 'q4', text: '事業（夢想）和愛情選哪個？', options: [
                    { label: '事業（夢想）', scores: { '四月': 2 } },
                    { label: '愛情', scores: { '鳥': 2 } },
                    { label: '都很難選', scores: { '水': 1, '火': 1 } }
                ]},
                { id: 'q5', text: '追求目標可以不擇手段嗎？', options: [
                    { label: '完全可以', scores: { '四月': 2 } },
                    { label: '合理的可以', scores: { '四月': 1, '鳥': 1, '火': 1 } },
                    { label: '不可以', scores: { '水': 2 } }
                ]},
                { id: 'q6', text: '穩定感受 vs 具體獨特？', options: [
                    { label: '穩定感受', scores: { '鳥': 1, '水': 1 } },
                    { label: '具體獨特', scores: { '四月': 1, '火': 1 } }
                ]},
                { id: 'q7', text: '付出型 vs 被付出型？', options: [
                    { label: '傾向付出型', scores: { '火': 2, '四月': 1 } },
                    { label: '傾向被付出型', scores: { '鳥': 2, '水': 1 } }
                ]},
                { id: 'q8', text: '想法容易被身邊的人改變？', options: [
                    { label: '是', scores: { '火': 1 } },
                    { label: '不是', scores: { '四月': 2 } },
                    { label: '還行', scores: { '鳥': 1, '水': 1 } }
                ]},
                { id: 'q9', text: '經常自我懷疑嗎？', options: [
                    { label: '是', scores: { '鳥': 1, '水': 2, '火': 1 } },
                    { label: '不是', scores: { '四月': 2 } }
                ]},
                { id: 'q10', text: '接受打罵嗎？', options: [
                    { label: '可以大打罵', scores: { '火': 2 } },
                    { label: '適度打罵', scores: { '火': 1, '四月': 1 } },
                    { label: '不可以', scores: { '鳥': 2, '水': 1 } }
                ]},
                { id: 'q11', text: '願意和 DM 愛情互動嗎？', options: [
                    { label: '非常願意', scores: { '水': 2 } },
                    { label: '無所謂', scores: { '水': 1 } },
                    { label: '不願意', scores: { '火': 1, '四月': 1, '鳥': 1 } }
                ]},
                { id: 'q13', text: '接受三角關係嗎？', options: [
                    { label: '完全可以', scores: { '鳥': 2 } },
                    { label: '可以嘗試', scores: { '鳥': 1 } },
                    { label: '不可以', scores: { '火': 2, '四月': 2, '水': 2 } }
                ]},
                { id: 'q14', text: '接受 CP 有寵寵線嗎？', options: [
                    { label: '無法接受', scores: {} },
                    { label: '更有一點介意', scores: { '四月': -1 } },
                    { label: '完全可以接受', scores: { '四月': 1 } }
                ]},
                { id: 'q15', text: '對寵寵付出的愛情線？', options: [
                    { label: '非常願意', scores: { '火': 3 } },
                    { label: '願意嘗試', scores: { '火': 1 } },
                    { label: '不願意', scores: { '鳥': 2, '四月': 2, '水': 2 } }
                ]},
                { id: 'q16', text: '互動滿足 vs 自我滿足？', options: [
                    { label: '互動滿足', scores: { '火': 2, '四月': 1, '鳥': 1 } },
                    { label: '自我滿足', scores: { '水': 2 } }
                ]}
            ]
        };

        // --- 組件部分 ---

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('player-form');
            const [players, setPlayers] = useState([]);
            const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Firebase Auth Error:", err);
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;

                const playersRef = collection(db, 'artifacts', appId, 'public', 'data', 'players');
                const unsubscribe = onSnapshot(playersRef,
                    (snap) => {
                        setPlayers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    },
                    (err) => {
                        console.error("Firestore Listen Error:", err);
                    }
                );
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                }
            }, [view, isAdminAuthenticated]);

            const renderView = () => {
                if (view === 'player-form') return <PlayerForm onSubmitSuccess={() => setView('submitted')} user={user} />;
                if (view === 'submitted') return <SubmittedView onReset={() => setView('player-form')} />;
                if (view === 'admin-dashboard') {
                    if (!isAdminAuthenticated) return <AdminLogin onLogin={() => setIsAdminAuthenticated(true)} />;
                    return <AdminDashboard players={players} user={user} />;
                }
            };

            return (
                <div className="min-h-screen flex flex-col font-sans">
                    <header className="bg-[#1a1a1a] border-b border-white/5 px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-lg">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-gradient-to-br from-indigo-600 to-purple-700 rounded-xl flex items-center justify-center shadow-indigo-500/20 shadow-lg">
                                <i data-lucide="users" className="text-white w-5 h-5"></i>
                            </div>
                            <div>
                                <h1 className="text-lg font-bold tracking-tight text-white">《水仙》分類小手</h1>
                                <p className="text-[10px] text-neutral-500 uppercase tracking-widest font-semibold">DM Professional System</p>
                            </div>
                        </div>
                        <button
                            onClick={() => {
                                setView(view === 'admin-dashboard' ? 'player-form' : 'admin-dashboard');
                                if (view !== 'admin-dashboard') setIsAdminAuthenticated(false);
                            }}
                            className="text-xs font-bold px-4 py-2 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 hover:scale-105 active:scale-95 transition-all text-neutral-300"
                        >
                            {view === 'admin-dashboard' ? '切換到測驗面' : '主持人後台'}
                        </button>
                    </header>
                    <main className="flex-1 max-w-5xl mx-auto w-full p-4 md:p-10">
                        {renderView()}
                    </main>
                    <footer className="text-center py-8 text-neutral-700 text-[10px] uppercase tracking-[0.2em] font-bold">
                        &copy; Narcissus Role Sorter Professional Edition
                    </footer>
                </div>
            );
        }

        function PlayerForm({ onSubmitSuccess, user }) {
            const [gender, setGender] = useState('M');
            const [formData, setFormData] = useState({
                name: '',
                answers: {},
                openAnswers: { normal: '', favChars: '' },
                special: { sameSexDM: '不可以' }
            });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const testData = gender === 'M' ? MALE_TEST : FEMALE_TEST;

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.name.trim()) return;
                if (!user) {
                    alert("驗證尚未完成，請稍後再試。");
                    return;
                }

                setIsSubmitting(true);
                try {
                    const playersRef = collection(db, 'artifacts', appId, 'public', 'data', 'players');
                    await addDoc(playersRef, {
                        ...formData,
                        gender,
                        timestamp: Date.now(),
                        assignedRole: null,
                        userId: user.uid
                    });
                    onSubmitSuccess();
                } catch (err) {
                    console.error("Submission Error:", err);
                    alert("提交失敗，可能是權限不足或連線問題。");
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="max-w-2xl mx-auto space-y-8 animate-fade-in">
                    <div className="text-center space-y-3">
                        <h2 className="text-4xl font-black text-white italic tracking-tighter">角本分類心理測驗</h2>
                        <p className="text-neutral-500 font-medium">「每一棵水仙，都在尋找最真實的位置。」</p>
                    </div>

                    <div className="bg-[#1a1a1a] p-6 md:p-10 rounded-3xl border border-white/5 shadow-2xl space-y-10 border-t-indigo-500/30 border-t-2">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className="space-y-3">
                                <label className="text-[11px] font-black text-neutral-500 uppercase tracking-widest">玩家暱稱</label>
                                <input
                                    required
                                    type="text"
                                    value={formData.name}
                                    onChange={e => setFormData({...formData, name: e.target.value})}
                                    className="w-full bg-neutral-900 border border-white/10 rounded-xl px-4 py-4 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all text-white"
                                    placeholder="你的暱稱 / 英文名"
                                />
                            </div>
                            <div className="space-y-3">
                                <label className="text-[11px] font-black text-neutral-500 uppercase tracking-widest">性別版本</label>
                                <div className="grid grid-cols-2 gap-3">
                                    {['M', 'F'].map(g => (
                                        <button
                                            key={g}
                                            type="button"
                                            onClick={() => { setGender(g); setFormData({...formData, answers: {}}); }}
                                            className={`py-4 rounded-xl border text-sm font-black transition-all ${gender === g ? 'bg-indigo-600 border-indigo-400 text-white shadow-lg shadow-indigo-600/20' : 'bg-neutral-900 border-white/5 text-neutral-500 hover:border-white/20'}`}
                                        >
                                            {g === 'M' ? '男生版' : '女生版'}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="space-y-10">
                            <h3 className="text-indigo-400 font-black border-b border-white/5 pb-3 text-xs flex items-center gap-2 uppercase tracking-widest">
                                <i data-lucide="clipboard-check" className="w-4 h-4"></i> 核心性格測驗
                            </h3>
                            {testData.questions.map((q, idx) => (
                                <div key={q.id} className="space-y-5 group">
                                    <p className="text-lg font-bold leading-relaxed text-neutral-200">
                                        <span className="text-indigo-500 font-black mr-3 opacity-50">{idx + 1}.</span>
                                        {q.text}
                                    </p>
                                    <div className="grid grid-cols-1 gap-3">
                                        {q.options.map(opt => (
                                            <button
                                                key={opt.label}
                                                type="button"
                                                onClick={() => setFormData({...formData, answers: { ...formData.answers, [q.id]: opt.label }})}
                                                className={`text-left px-6 py-5 rounded-2xl border transition-all text-sm font-semibold ${formData.answers[q.id] === opt.label ? 'bg-indigo-500/10 border-indigo-500 text-indigo-300 shadow-inner' : 'bg-neutral-900/40 border-white/5 hover:border-white/20 hover:bg-neutral-900'}`}
                                            >
                                                {opt.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="space-y-10 pt-4">
                            <h3 className="text-purple-400 font-black border-b border-white/5 pb-3 text-xs flex items-center gap-2 uppercase tracking-widest">
                                <i data-lucide="message-square" className="w-4 h-4"></i> 深度思考題
                            </h3>
                            <div className="space-y-4">
                                <p className="text-xs font-bold text-neutral-400 uppercase tracking-tighter">現實生活中，如何定義「正常」？什麼是「正常人」？</p>
                                <textarea
                                    value={formData.openAnswers.normal}
                                    onChange={e => setFormData({...formData, openAnswers: {...formData.openAnswers, normal: e.target.value}})}
                                    className="w-full bg-neutral-900 border border-white/10 rounded-2xl p-5 min-h-[120px] outline-none focus:border-purple-500 transition-all text-white text-sm leading-relaxed"
                                    placeholder="請簡單分享你的看法..."
                                />
                            </div>
                            <div className="space-y-4">
                                <p className="text-xs font-bold text-neutral-400 uppercase tracking-tighter">印象深刻角色 (作品 + 角色名稱)</p>
                                <textarea
                                    value={formData.openAnswers.favChars}
                                    onChange={e => setFormData({...formData, openAnswers: {...formData.openAnswers, favChars: e.target.value}})}
                                    className="w-full bg-neutral-900 border border-white/10 rounded-2xl p-5 min-h-[120px] outline-none focus:border-purple-500 transition-all text-white text-sm leading-relaxed"
                                    placeholder="例：《(作品名)》中的 XXX 角色..."
                                />
                            </div>
                            <div className="space-y-4">
                                <p className="text-xs font-bold text-neutral-400 uppercase tracking-tighter">可接受與【同性別 DM】發生愛情互動嗎？</p>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                                    {['完全可以', '可以接受並嘗試', '不可以'].map(opt => (
                                        <button
                                            key={opt}
                                            type="button"
                                            onClick={() => setFormData({...formData, special: { sameSexDM: opt }})}
                                            className={`px-4 py-4 rounded-xl border text-xs font-bold transition-all ${formData.special.sameSexDM === opt ? 'bg-purple-500/10 border-purple-500 text-purple-300' : 'bg-neutral-900 border-white/5 text-neutral-500 hover:border-white/20'}`}
                                        >
                                            {opt}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <button
                            onClick={handleSubmit}
                            disabled={isSubmitting || Object.keys(formData.answers).length < testData.questions.length}
                            className="w-full bg-gradient-to-r from-indigo-600 to-purple-700 py-6 rounded-2xl font-black text-white shadow-2xl hover:scale-[1.01] active:scale-95 transition-all disabled:opacity-30 disabled:grayscale disabled:cursor-not-allowed text-lg tracking-widest"
                        >
                            {isSubmitting ? '正在傳送資料...' : '完成測驗並提交'}
                        </button>
                    </div>
                </div>
            );
        }

        function SubmittedView({ onReset }) {
            return (
                <div className="max-w-md mx-auto text-center py-24 space-y-8 animate-fade-in">
                    <div className="w-24 h-24 bg-indigo-500/10 text-indigo-500 rounded-full flex items-center justify-center mx-auto mb-4 border border-indigo-500/20 shadow-xl">
                        <i data-lucide="check-circle-2" className="w-12 h-12"></i>
                    </div>
                    <div className="space-y-2">
                        <h2 className="text-3xl font-black text-white">提交成功</h2>
                        <p className="text-neutral-500 font-medium leading-relaxed">你的測驗結果已加密傳送到後台。<br/>請在現場等待 DM 為你抽選角色。</p>
                    </div>
                    <button
                        onClick={onReset}
                        className="text-xs text-neutral-600 hover:text-white underline underline-offset-8 font-bold transition-all"
                    >
                        重新填寫測驗
                    </button>
                </div>
            );
        }

        function AdminLogin({ onLogin }) {
            const [pwd, setPwd] = useState('');
            return (
                <div className="max-w-sm mx-auto mt-20 p-10 bg-[#1a1a1a] rounded-3xl border border-white/5 text-center space-y-8 shadow-2xl animate-fade-in">
                    <div className="w-16 h-16 bg-indigo-600/10 text-indigo-500 rounded-2xl flex items-center justify-center mx-auto">
                        <i data-lucide="lock" className="w-8 h-8"></i>
                    </div>
                    <h2 className="text-2xl font-black text-white">後台權限驗證</h2>
                    <form onSubmit={e => { e.preventDefault(); if (pwd === 'dm888') onLogin(); else alert('密碼錯誤'); }} className="space-y-5">
                        <input
                            type="password"
                            placeholder="輸入密碼 (預設: dm888)"
                            value={pwd}
                            onChange={e => setPwd(e.target.value)}
                            className="w-full bg-neutral-900 border border-white/10 rounded-xl px-5 py-4 outline-none focus:border-indigo-500 transition-all text-white text-center"
                        />
                        <button className="w-full bg-indigo-600 py-4 rounded-xl font-black shadow-lg shadow-indigo-600/20 hover:bg-indigo-500 transition-all">進入系統</button>
                    </form>
                </div>
            );
        }

        function AdminDashboard({ players, user }) {
            const [activeTab, setActiveTab] = useState('data');

            const playersWithScores = useMemo(() => {
                return players.map(p => {
                    const test = p.gender === 'M' ? MALE_TEST : FEMALE_TEST;
                    const scores = {};
                    test.roles.forEach(r => scores[r] = 0);
                    Object.entries(p.answers || {}).forEach(([qId, selectedLabel]) => {
                        const question = test.questions.find(q => q.id === qId);
                        const option = question?.options.find(opt => opt.label === selectedLabel);
                        if (option?.scores) {
                            Object.entries(option.scores).forEach(([role, val]) => {
                                scores[role] = (scores[role] || 0) + val;
                            });
                        }
                    });
                    return { ...p, calculatedScores: scores };
                });
            }, [players]);

            const autoAssign = async () => {
                if (!user) return;
                const genders = ['M', 'F'];
                for (const g of genders) {
                    const gPlayers = playersWithScores.filter(p => p.gender === g);
                    const test = g === 'M' ? MALE_TEST : FEMALE_TEST;
                    const availableRoles = [...test.roles];
                    const matches = [];
                    const remainingPlayers = [...gPlayers];

                    while (availableRoles.length > 0 && remainingPlayers.length > 0) {
                        let bestMatch = null;
                        for (const p of remainingPlayers) {
                            for (const r of availableRoles) {
                                if (!bestMatch || p.calculatedScores[r] > bestMatch.score) {
                                    bestMatch = { player: p, role: r, score: p.calculatedScores[r] };
                                }
                            }
                        }
                        if (bestMatch) {
                            matches.push({ playerId: bestMatch.player.id, role: bestMatch.role });
                            availableRoles.splice(availableRoles.indexOf(bestMatch.role), 1);
                            remainingPlayers.splice(remainingPlayers.indexOf(bestMatch.player), 1);
                        }
                    }
                    for (const m of matches) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', m.playerId), { assignedRole: m.role });
                    }
                }
            };

            const clearData = async () => {
                if (!user || !confirm('確定要清空所有數據嗎？此動作無法還原。')) return;
                for (const p of players) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', p.id));
                }
            };

            return (
                <div className="space-y-8 animate-fade-in">
                    <div className="flex flex-col md:flex-row justify-between items-end md:items-center gap-6 border-b border-white/5 pb-8">
                        <div>
                            <h2 className="text-3xl font-black italic text-white">後台管理中心</h2>
                            <p className="text-sm font-bold text-neutral-500 mt-1 uppercase tracking-widest">目前登記人數: {players.length}</p>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={clearData} className="px-5 py-2.5 text-xs font-black text-red-500 hover:bg-red-500/10 rounded-xl transition-all border border-red-500/20">清除數據</button>
                            <button onClick={autoAssign} className="bg-indigo-600 hover:bg-indigo-500 px-6 py-2.5 rounded-xl font-black text-sm flex items-center gap-2 shadow-lg shadow-indigo-600/20 transition-all active:scale-95">
                                <i data-lucide="play" className="w-4 h-4"></i> 智能分配
                            </button>
                        </div>
                    </div>

                    <div className="flex gap-4">
                        <button onClick={() => setActiveTab('data')} className={`px-6 py-2.5 text-xs font-black rounded-xl transition-all ${activeTab === 'data' ? 'bg-white/10 text-white shadow-lg' : 'text-neutral-500 hover:text-neutral-300'}`}>數據詳情</button>
                        <button onClick={() => setActiveTab('results')} className={`px-6 py-2.5 text-xs font-black rounded-xl transition-all ${activeTab === 'results' ? 'bg-white/10 text-white shadow-lg' : 'text-neutral-500 hover:text-neutral-300'}`}>分配結果</button>
                    </div>

                    {activeTab === 'data' ? (
                        <div className="grid grid-cols-1 gap-6">
                            {playersWithScores.map(p => (
                                <div key={p.id} className="bg-[#1a1a1a] p-6 md:p-8 rounded-3xl border border-white/5 space-y-6 shadow-xl">
                                    <div className="flex flex-col md:flex-row justify-between items-start gap-4">
                                        <div className="flex items-center gap-4">
                                            <div className={`w-14 h-14 rounded-2xl flex items-center justify-center font-black text-2xl shadow-inner ${p.gender === 'M' ? 'bg-blue-500/10 text-blue-400' : 'bg-pink-500/10 text-pink-400'}`}>
                                                {p.name ? p.name[0] : '?'}
                                            </div>
                                            <div>
                                                <h3 className="font-black text-xl text-white">{p.name}</h3>
                                                <div className="flex items-center gap-2 mt-1">
                                                    <span className={`text-[10px] font-black px-2 py-0.5 rounded uppercase ${p.gender === 'M' ? 'bg-blue-500/20 text-blue-300' : 'bg-pink-500/20 text-pink-300'}`}>
                                                        {p.gender === 'M' ? 'Male' : 'Female'}
                                                    </span>
                                                    <span className="text-[10px] font-black px-2 py-0.5 rounded bg-white/5 text-neutral-500 uppercase">
                                                        DM 互動: {p.special?.sameSexDM}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex flex-wrap gap-4 bg-black/20 p-4 rounded-2xl border border-white/5">
                                            {Object.entries(p.calculatedScores).map(([role, score]) => (
                                                <div key={role} className="text-center min-w-[50px]">
                                                    <p className="text-[10px] text-neutral-600 font-black uppercase tracking-tighter mb-1">{role}</p>
                                                    <p className="text-lg font-black text-white">{score}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="bg-black/20 p-5 rounded-2xl border border-white/5 text-[12px] space-y-2">
                                            <p className="text-indigo-400 font-black uppercase tracking-widest text-[10px]">正常人的定義</p>
                                            <p className="text-neutral-300 italic leading-relaxed">{p.openAnswers?.normal || '未回答'}</p>
                                        </div>
                                        <div className="bg-black/20 p-5 rounded-2xl border border-white/5 text-[12px] space-y-2">
                                            <p className="text-purple-400 font-black uppercase tracking-widest text-[10px]">印象深刻角色</p>
                                            <p className="text-neutral-300 italic leading-relaxed">{p.openAnswers?.favChars || '未回答'}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {players.length === 0 && <div className="text-center py-20 text-neutral-700 font-black italic uppercase tracking-widest">Waiting for players to submit...</div>}
                        </div>
                    ) : (
                        <div className="bg-[#1a1a1a] rounded-3xl border border-white/5 overflow-hidden shadow-2xl">
                            <table className="w-full text-left text-sm">
                                <thead className="bg-white/5 text-neutral-500 uppercase font-black text-[11px] tracking-widest">
                                    <tr>
                                        <th className="px-8 py-5">玩家名稱</th>
                                        <th className="px-8 py-5 text-center">測驗版本</th>
                                        <th className="px-8 py-5">分配角色</th>
                                        <th className="px-8 py-5">DM 互動意願</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-white/5 font-semibold">
                                    {playersWithScores.map(p => (
                                        <tr key={p.id} className="hover:bg-white/[0.02] transition-colors group">
                                            <td className="px-8 py-6 text-white text-lg font-black">{p.name}</td>
                                            <td className="px-8 py-6 text-center">
                                                <span className={p.gender === 'M' ? 'text-blue-400' : 'text-pink-400'}>{p.gender === 'M' ? '男' : '女'}</span>
                                            </td>
                                            <td className="px-8 py-6">
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-2 h-2 rounded-full ${p.assignedRole ? 'bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.5)]' : 'bg-neutral-800'}`}></div>
                                                    <span className={p.assignedRole ? 'text-indigo-400 font-black text-xl italic' : 'text-neutral-700'}>
                                                        {p.assignedRole || '尚未分配'}
                                                    </span>
                                                </div>
                                            </td>
                                            <td className="px-8 py-6 text-neutral-500 text-xs font-bold uppercase">{p.special?.sameSexDM}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            {players.length === 0 && <div className="text-center py-24 text-neutral-800 font-black italic uppercase tracking-[0.5em]">No Data</div>}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
